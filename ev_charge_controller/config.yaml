name: "EV Charge Controller"
description: "Laravel-based Home Assistant add-on for Nordpool, solar-aware EV charging control."
version: "0.1.8"
slug: "ev_charge_controller"
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: "mdi:ev-station"
panel_title: "EV Charger"
arch:
  - aarch64
  - amd64
options:
  app_env: production
  app_debug: false
  app_timezone: Europe/Tallinn
  log_level: info
  charger_connection_webhook_secret: change-me
  db_host: ""
  db_port: 3306
  db_database: ""
  db_username: ""
  db_password: ""
  home_assistant_url: "https://homeassistant.local"
  home_assistant_token: ""
  home_assistant_timeout: 10
  charger_name: c26634
  charger_battery_capacity_kwh: 40
  charger_daily_min_soc_percent: 70
  charger_target_soc_percent: 80
  charger_daily_min_deadline: "07:00"
  charger_power_kw: 4
  charger_min_current_amps: 6
  charger_max_current_amps: 16
  charger_efficiency: 0.92
  grid_day_rate_per_kwh: 8.1
  grid_night_rate_per_kwh: 4.6
  grid_weekend_rate_per_kwh: 5.2
  grid_prices_in_cents: true
  grid_prices_include_vat: false
  grid_vat_rate: 0.24
  grid_day_rate_starts_at: "07:00"
  grid_night_rate_starts_at: "22:00"
  charger_switch_entity_id: switch.c26634_charge_control
  charger_max_current_entity_id: number.c26634_maximum_current
  charger_energy_total_entity_id: sensor.c26634_energy_active_import_register
  vehicle_soc_entity_id: sensor.leaf_battery_level
  nordpool_entity_id: sensor.nordpool_kwh_ee_eur_3_10_024
  solar_forecast_east_entity_id: sensor.energy_production_today
  solar_forecast_west_entity_id: sensor.energy_production_today_2
  solar_current_hour_east_entity_id: sensor.energy_current_hour
  solar_current_hour_west_entity_id: sensor.energy_current_hour_2
  solar_next_hour_east_entity_id: sensor.energy_next_hour
  solar_next_hour_west_entity_id: sensor.energy_next_hour_2
  house_load_entity_id: ""
schema:
  app_env: str
  app_debug: bool
  app_timezone: str
  log_level: str
  charger_connection_webhook_secret: password
  db_host: "str?"
  db_port: "int(1,65535)"
  db_database: "str?"
  db_username: "str?"
  db_password: password
  home_assistant_url: url
  home_assistant_token: password
  home_assistant_timeout: "int(1,60)"
  charger_name: str
  charger_battery_capacity_kwh: float
  charger_daily_min_soc_percent: "int(1,100)"
  charger_target_soc_percent: "int(1,100)"
  charger_daily_min_deadline: "match(^([01]\\d|2[0-3]):[0-5]\\d$)"
  charger_power_kw: float
  charger_min_current_amps: "int(1,32)"
  charger_max_current_amps: "int(1,32)"
  charger_efficiency: float
  grid_day_rate_per_kwh: float
  grid_night_rate_per_kwh: float
  grid_weekend_rate_per_kwh: float
  grid_prices_in_cents: bool
  grid_prices_include_vat: bool
  grid_vat_rate: float
  grid_day_rate_starts_at: "match(^([01]\\d|2[0-3]):[0-5]\\d$)"
  grid_night_rate_starts_at: "match(^([01]\\d|2[0-3]):[0-5]\\d$)"
  charger_switch_entity_id: str
  charger_max_current_entity_id: str
  charger_energy_total_entity_id: str
  vehicle_soc_entity_id: str
  nordpool_entity_id: str
  solar_forecast_east_entity_id: str
  solar_forecast_west_entity_id: str
  solar_current_hour_east_entity_id: str
  solar_current_hour_west_entity_id: str
  solar_next_hour_east_entity_id: str
  solar_next_hour_west_entity_id: str
  house_load_entity_id: "str?"
